services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: solarc
      POSTGRES_PASSWORD: dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.62
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # Run migrations before the app starts (ensures tables exist)
  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:dev@postgres:5432/solarc
    working_dir: /app/packages/db
    command: ["npx", "tsx", "src/migrate.ts"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:dev@postgres:5432/solarc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      NODE_ENV: development
      VAULT_SECRET: ${VAULT_SECRET:-default-dev-vault-secret-change-me}
      AUTH_SECRET: ${AUTH_SECRET:-default-dev-auth-secret-change-me}

volumes:
  pgdata:
